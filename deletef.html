<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Delete Employee Data</title>
</head>
<body>
  <!-- Container for Form -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg">
          <div class="card-body">
            <h1 class="text-center text-danger mb-4">Delete Employee Data</h1>
            <form method="POST" action="/employee/delete">
              <div class="mb-3">
                <label for="emp_id" class="form-label">Enter Emp_ID to Delete Record</label>
                <input type="text" id="emp_id" name="emp_id" class="form-control" placeholder="Enter Employee ID" required>
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-danger btn-lg">Delete</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-danger text-white text-center py-3 mt-5">
    <p class="mb-0">© 2025 Employee Management System. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
